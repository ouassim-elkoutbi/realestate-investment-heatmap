<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Real Estate Heatmap</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
    body { margin: 0; font-family: system-ui, sans-serif; }
    #map { height: 100vh; }
    .controls {
        position: absolute; top: 10px; right: 10px; z-index: 1000;
        background: white; padding: 12px; border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.25);
    }
    .controls select { display: block; margin-top: 6px; padding: 6px; width: 200px; }
    .legend {
    position: absolute; top: 260px; right: 10px; z-index: 1000;
    background: white; padding: 10px; border-radius: 8px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.25); font-size: 13px;
    width: 240px; box-sizing: border-box;
}
</style>
</head>
<body>
<div id="map"></div>
<div class="controls">
    <label>City <select id="citySelect"></select></label>
    <label>Metric
        <select id="metricSelect">
            <option value="sale_price">Sale price (€/m²)</option>
            <option value="yield">Rental yield (%)</option>
            <option value="growth">Annual growth 2010-22 (%)</option>
            <option value="investment_score">Investment score (0-100)</option>
        </select>
    </label>
</div>
<div class="legend" id="legend"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const API = '../api';
let map = L.map('map').setView([39.47, -0.376], 13);
let bubbleLayer = L.layerGroup().addTo(map);

L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OpenStreetMap &copy; CARTO'
}).addTo(map);

// color: verde (bajo) -> amarillo -> rojo (alto)
function getColor(value, min, max) {
    const t = (value - min) / (max - min || 1);
    const hue = (1 - t) * 120; // 120=verde, 0=rojo
    return `hsl(${hue}, 80%, 45%)`;
}

async function loadCities() {
    const res = await fetch(`${API}/cities.php`);
    const cities = await res.json();
    const sel = document.getElementById('citySelect');
    sel.innerHTML = cities.map(c => `<option value="${c.id}" data-lat="${c.center_lat}" data-lon="${c.center_lon}">${c.name}</option>`).join('');
}

async function loadZones() {
    const cityId = document.getElementById('citySelect').value;
    const metric = document.getElementById('metricSelect').value;
    try {
        const res = await fetch(`${API}/zones.php?city_id=${cityId}&metric=${metric}`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const zones = await res.json();

        bubbleLayer.clearLayers();
        const values = zones.map(z => parseFloat(z.value));
        const min = Math.min(...values), max = Math.max(...values);

        const units = { sale_price: '€/m²', yield: '%', growth: '%/year', investment_score: '/100' };
        const higherIsBetter = { sale_price: false, yield: true, growth: true, investment_score: true };

        zones.forEach(z => {
            const v = parseFloat(z.value);
            L.circleMarker([parseFloat(z.lat), parseFloat(z.lon)], {
                radius: 8 + 12 * (v - min) / (max - min || 1),
                fillColor: higherIsBetter[metric] ? getColor(v, max, min) : getColor(v, min, max),
                color: '#333', weight: 1, fillOpacity: 0.75
            })
            .bindPopup(`<b>${z.name}</b><br>${v} ${units[metric]}`)
            .addTo(bubbleLayer);
        });

        const better = higherIsBetter[metric];
        document.getElementById('legend').innerHTML =`<b>${document.getElementById('metricSelect').selectedOptions[0].text}</b><br>
             <span style="color:hsl(${better ? 0 : 120},80%,45%)">●</span> ${min.toFixed(1)} (min) &nbsp;
             <span style="color:hsl(${better ? 120 : 0},80%,45%)">●</span> ${max.toFixed(1)} (max)`;
    } catch (err) {
        console.error('Error loading zones:', err);
        alert(`Error loading "${metric}": ${err.message}`);
    }
}

document.getElementById('metricSelect').addEventListener('change', loadZones);
document.getElementById('citySelect').addEventListener('change', (e) => {
    const opt = e.target.selectedOptions[0];
    map.setView([parseFloat(opt.dataset.lat), parseFloat(opt.dataset.lon)], 13);
    loadZones();
});

loadCities().then(loadZones);
</script>
</body>
</html>
